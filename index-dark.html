<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, shrink-to-fit=yes">
  <title> One UI Calculator</title>
  <link rel="stylesheet" href="OneUI/oui.min.css">
  <link rel="stylesheet" href="materialize.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link rel="icon" href="OUC.ico">
  <style>
    @font-face {
      font-family: 'SamsungOne 400';
      src: local('SamsungOne 400'), url('SamsungOne-400.woff') format('woff');
    }

    * {
      font-family: 'SamsungOne 400';
      font-size: larger;
    }

    .input {
      border-radius: 25px;
      color: black;
    }

    .clear {
      border-radius: 25px;
      color: orangered;
    }

    .operate {
      border-radius: 25px;
      color: lightgreen;
    }

    .equal {
      border-radius: 25px;
      color: white;
    }
  </style>
<script type="text/javascript" src="Calculator.js"></script>
<script type="text/javascript" src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
<script type="text/javascript" src="materialize.js"></script>
<script>$(document).ready(function () {
  // Add smooth scrolling to all links
  $("a").on('click', function (event) {

      // Make sure this.hash has a value before overriding default behavior
      if (this.hash !== "") {
          // Prevent default anchor click behavior
          event.preventDefault();

          // Store hash
          var hash = this.hash;

          // Using jQuery's animate() method to add smooth page scroll
          // The optional number (800) specifies the number of milliseconds it takes to scroll to the specified area
          $('html, body').animate({
              scrollTop: $(hash).offset().top
          }, 800, function () {

              // Add hash (#) to URL when done scrolling (default click behavior)
              window.location.hash = hash;
          });
      } // End if
  });
});
$(document).ready(function () {
  $('.fixed-action-btn').openFAB();
$('.fixed-action-btn').closeFAB();
$('.fixed-action-btn.toolbar').openToolbar();
$('.fixed-action-btn.toolbar').closeToolbar();
  $('.tooltipped').tooltip({delay: 50});
})
</script>
</head>
<body oncontextmenu="return false;" class="black white-text">
  <main class="container">
    <div class="oui-interaction center-align">
      <!-- Interaction area -->
      <div class="fixed-action-btn click-to-toggle">
        <a class="btn-floating btn-large green btn tooltipped" data-position="left" data-delay="50" data-tooltip="Menu">
          <i class="large material-icons">more_vert</i>
        </a>
        <ul>
          <li><a class="btn-floating green btn tooltipped" data-position="left" data-delay="50" data-tooltip="About" href="about-dark.html"><i class="material-icons">info</i></a></li>
          <li><a class="btn-floating green btn tooltipped" data-position="left" data-delay="50" data-tooltip="Dark/Light" href="index.html"><i class="material-icons">toggle_on</i></a></li>
          <li><a class="btn-floating green btn tooltipped" data-position="left" data-delay="50" data-tooltip="Converter" href="convert-dark.html"><i class="material-icons">straighten</i></a></li>
        </ul>
      </div>
      <div class="oui-bubble black white-text" id="page">
        <form name="calc">
          <br>
          <br>
          <input type="text" name="ans" id="number_input" readonly class="right-align"
            style="left: 22px; font-size: 35px; border-top: none; border-left: none; border-right: none; border-bottom-width: 0px;">
            <br>
            <br>
            <br>
            <br>
            <br>
            <br><div class="hide-on-med-and-up">
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br></div>
          <a href="index-dark.html#page" onclick="f1()" class="input white-text" style="right:22px; position: absolute;"><i
              class="material-icons">backspace</i>
          </a>
          <a href="index-dark.html#page" onclick="document.calc.ans.value+=')'" class="input white-text"

          </a>
          <br>
          <br>
          <hr>
          <div style="padding: 4px; font-size: 20px;" class="center-align">
            <button type="button" onclick="document.calc.ans.value=''" class="btn grey darken-3 btn-large clear"
              style="font-size: larger;">C</button>

            <button type="button" onclick="document.calc.ans.value+='%'" class="btn grey darken-3 btn-large operate"

            <button type="button" onclick="document.calc.ans.value+='/'" class="btn grey darken-3 btn-large operate"
              style="font-size: larger;">÷</button>
            <br>
            <br>
            <button type="button" onclick="document.calc.ans.value+='7'"
              class="btn grey darken-3 white-text btn-large input" style="font-size: larger;">7</button>
            <button type="button" onclick="document.calc.ans.value+='8'"
              class="btn grey darken-3 white-text btn-large input" style="font-size: larger;">8</button>
            <button type="button" onclick="document.calc.ans.value+='9'"
              class="btn grey darken-3 white-text btn-large input" style="font-size: larger;">9</button>
            <button type="button" onclick="document.calc.ans.value+='*'" class="btn grey darken-3 btn-large operate"

            <button type="button" onclick="document.calc.ans.value+='-'" class="btn grey darken-3 btn-large operate"

            <br>

            <button type="button" onclick="document.calc.ans.value+='3'"

            <button type="button" onclick="document.calc.ans.value+='+'" class="btn grey darken-3 btn-large operate"

            <br>

              style="font-size: larger;">&#177;</button>
            <button type="button" onclick="document.calc.ans.value+='0'"

            <button type="button" onclick="document.calc.ans.value+='.'"

            <button type="button" onclick="document.calc.ans.value = eval(document.calc.ans.value)"

            <br>
            <br>
            <button type="button" onclick="f5()" class="btn grey darken-3 white-text btn-large input"
              style="font-size: larger;">²</button>
            <button type="button" onclick="f8()" class="btn grey darken-3 white-text btn-large input"
              style="font-size: larger;">³</button>
            <button type="button" onclick="f2()" class="btn grey darken-3 white-text btn-large input"
              style="font-size: larger;">&#8730;</button>
            <button type="button" onclick="f7()" class="btn grey darken-3 white-text btn-large input"
              style="font-size: larger;">&#8731;</button>
          </div>

      <h5>One UI Calculator</h5>
      <h6>2021.2.3</h6>

</html>
